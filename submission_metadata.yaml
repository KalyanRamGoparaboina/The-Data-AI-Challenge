approach:
  name: Hybrid TF-IDF + Multi-Signal Scoring
  description: >
    A multi-layered hybrid ranking system that combines TF-IDF semantic similarity
    with structured career, skill, and behavioral signal scoring to rank candidates
    the way an expert recruiter would — not by keyword matching, but by genuine fit.

  components:
    semantic_layer:
      method: TF-IDF Cosine Similarity (bigrams, sublinear TF)
      features: candidate headline, summary, current title, industry, skills (weighted
        by proficiency), career history titles and descriptions, certifications
      weight: 35%
      rationale: Captures contextual alignment between candidate experience narratives
        and the JD, rewarding candidates who have actually worked on ranking, retrieval,
        and recommendation systems regardless of exact keyword usage.

    skill_layer:
      method: Taxonomy-based keyword matching with proficiency and endorsement weighting
      features: skill name match against 50+ core ML/AI/retrieval keywords, proficiency
        level (beginner/intermediate/advanced/expert), peer endorsements, Redrob
        platform skill assessment scores
      weight: 25%
      rationale: Ensures candidates have hands-on technical competence in the exact
        technology stack required — embeddings, vector DBs, ranking frameworks, NLP.

    career_layer:
      method: Rule-based career trajectory scoring
      features: ML/AI months at product companies, production deployment keywords
        in descriptions (deployed, shipped, scale, A/B test), consulting company
        penalty (TCS/Infosys/Wipro/Accenture etc.)
      weight: 15%
      rationale: The JD explicitly penalizes pure consulting backgrounds and pure
        research roles. This layer rewards candidates with tangible production experience
        at product companies.

    experience_seniority_layer:
      method: Piecewise scoring function
      features: years_of_experience (sweet spot 5-9 years), current title seniority
        (Senior/Lead/Principal/Staff/Architect), ML/AI title relevance
      weight: 15%
      rationale: JD targets 5-9 year experienced engineers. Scores peak at this
        range and decay outside it, with seniority boosting ML/AI-focused titles.

    signals_layer:
      method: Weighted behavioral signal aggregation
      features: open_to_work_flag, notice_period_days, recruiter_response_rate,
        interview_completion_rate, avg_response_time_hours, github_activity_score,
        last_active_date recency, verified_email, verified_phone, linkedin_connected,
        profile_completeness_score
      weight: 10%
      rationale: A perfect-on-paper candidate who hasn't logged in for 6 months
        and has a 5% recruiter response rate is not actually available. This layer
        surfaces only candidates who are genuinely reachable and engaged.

    disqualifier_penalties:
      method: Hard penalty deductions (0-45 points)
      features: non-ML current title (-22), very low recruiter response (<10% = -18),
        platform inactivity >180 days (-12), pure consulting background (-15),
        no production ML evidence (-5)
      rationale: Directly implements the JD disqualifier criteria. Prevents surface-level
        keyword matches from gaming the ranking.

